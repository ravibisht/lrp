name: Build and Deploy to Master

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        run: npm run build

      - name: Deploy dist/ to master branch root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save only the dist folder
          cp -r dist /tmp/dist-output

          # Discard uncommitted changes
          git checkout -- .
          git clean -fd --exclude=node_modules

          # Switch to master
          git fetch origin master
          git checkout master

          # Wipe everything EXCEPT node_modules
          git rm -rf . --quiet

          # Copy dist contents to root
          cp -r /tmp/dist-output/. .

          # Ensure node_modules is ignored in master too
          echo "node_modules/" > .gitignore

          # Stage everything — .gitignore will prevent node_modules from being added
          git add -A

          git commit -m "Deploy: main@${{ github.sha }}" || echo "Nothing to commit"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}