name: Build and Deploy to Master

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy dist/ to master branch root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bhupenders225@gmail.com"

          # Save the Vite build output
          cp -r dist /tmp/dist-output

          # Switch to master
          git fetch origin master
          git checkout master

          # Wipe everything and replace with dist contents
          git rm -rf . --quiet
          cp -r /tmp/dist-output/. .

          # Commit and push
          git add -A
          git commit -m "Deploy: main@${{ github.sha }}" || echo "Nothing to commit"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}