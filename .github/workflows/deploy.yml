name: LRP Build & Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Node.js ESM/CJS Runtime (Node 22)
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install NPM Dependencies
      run: npm install

    - name: Validate TypeScript & Linter
      run: npm run lint

    - name: Compile and Bundle Production Build
      run: npm run build
      env:
        NODE_ENV: production

    # Optional Build Artifact Storage
    - name: Secure Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lrp-build-dist
        path: dist/
        retention-days: 7

  # Highly-requested Cloud Run continuous deployment blueprint
  # To enable this, configure automatic Google Cloud credentials inside your GitHub repository secrets.
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

